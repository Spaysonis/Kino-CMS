{% extends "main/base_page.html" %}
{% block content %}

<div class="container mt-2   p-4" style="background-color: #313549; max-width: 1200px; ">

  <!-- заголовок раздела (как на условном макете, выделен жирным) -->


  <!-- строка с карточками кинотеатров – контекст передаётся через названия -->
    {%if cinemas%}
  <div class="row">
      {%for cinema in cinemas%}
    <!-- карточка 1: кинотеатр "Cinema Kentucky I" -->
    <div class="col-md-6 col-lg-4 mb-4">
      <div class="card h-100 shadow-sm border-0 rounded-lg">
        <!-- заголовок карточки с названием кинотеатра (контекстное имя) -->
        <div class="card-header bg-white border-0 pt-4 px-4 pb-0 d-flex align-items-center">
          <i class="fas fa-building text-primary mr-2"></i>
          <h5 class="card-title mb-0 font-weight-bold">{{cinema.title}}</h5>
        </div>
        <!-- тело карточки с адресом и деталями (пример контекста) -->
        <div class="card-body px-4 pt-3">
          <p class="card-text small text-muted mb-2">
            <i class="fas fa-map-marker-alt mr-1" style="width: 1rem;"></i> 123 Main St, Louisville, KY
          </p>
          <p class="card-text small text-muted mb-2">
            <i class="fas fa-ticket-alt mr-1"></i> 3 зала, 450 мест
          </p>
          <p class="card-text small text-muted mb-0">
            <i class="fas fa-phone-alt mr-1"></i> +1 (502) 555-1234
          </p>
          <hr class="my-3">
          <!-- небольшой список сеансов – тоже часть контекста -->
          <span class="badge badge-pill badge-light border mr-1">12:30</span>
          <span class="badge badge-pill badge-light border mr-1">15:45</span>
          <span class="badge badge-pill badge-light border mr-1">19:00</span>
          <span class="badge badge-pill badge-light border">22:15</span>
        </div>
        <!-- кнопка детальнее (только bootstrap) -->
        <div class="card-footer bg-white border-0 pb-4 px-4">
          <a href="{%url 'schedule'%}?cinema={{ cinema.id }}&date_session={{ selected_date }}" class="btn btn-sm btn-outline-primary btn-block">Выбрать сеанс</a>
        </div>
      </div>
    </div>
      {%endfor%}
      {%endif%}
  </div>
</div> <!-- конец container -->
{% endblock %}
<!-- jQuery, Popper, Bootstrap JS (для работы компонентов, не обязательно для макета) -->
