
{% extends "cms/statistics.html" %}
{%load static%}
{% block content %}



    <div class="row">

      <!-- Map card -->
      <div class="card bg-gradient-primary">
              <div class="card-header border-0 ui-sortable-handle" style="cursor: move;">
                <h3 class="card-title">
                  <i class="fas fa-map-marker-alt mr-1"></i>
                  Visitors
                </h3>
                <!-- card tools -->
                <div class="card-tools">
                  <button type="button" class="btn btn-primary btn-sm daterange" title="Date range">
                    <i class="far fa-calendar-alt"></i>
                  </button>
                  <button type="button" class="btn btn-primary btn-sm" data-card-widget="collapse" title="Collapse">
                    <i class="fas fa-minus"></i>
                  </button>
                </div>
                <!-- /.card-tools -->
              </div>
              <div class="card-body">
                 <div id="vmap" style="width: 600px; height: 400px;"></div>
              </div>
              <!-- /.card-body-->
              <div class="card-footer bg-transparent">
                <div class="row">
                  <div class="col-4 text-center">
                    <div id="sparkline-1"><canvas width="80" height="50" style="width: 80px; height: 50px;"></canvas></div>
                    <div class="text-white">Visitors</div>
                  </div>
                  <!-- ./col -->
                  <div class="col-4 text-center">
                    <div id="sparkline-2"><canvas width="80" height="50" style="width: 80px; height: 50px;"></canvas></div>
                    <div class="text-white">Online</div>
                  </div>
                  <!-- ./col -->
                  <div class="col-4 text-center">
                    <div id="sparkline-3"><canvas width="80" height="50" style="width: 80px; height: 50px;"></canvas></div>
                    <div class="text-white">Sales</div>
                  </div>
                  <!-- ./col -->
                </div>
                <!-- /.row -->
              </div>
            </div>








      <!-- Sessions -->
      <div class="col-lg-4 col-12">
          <div class="card bg-gradient-info">
              <div class="card-header border-0 ui-sortable-handle" style="cursor: move;">
                <h3 class="card-title">
                  <i class="fas fa-th mr-1"></i>
                  Sales Graph
                </h3>

                <div class="card-tools">
                  <button type="button" class="btn bg-info btn-sm" data-card-widget="collapse">
                    <i class="fas fa-minus"></i>
                  </button>

                </div>
              </div>
              <div class="card-body"><div class="chartjs-size-monitor"><div class="chartjs-size-monitor-expand"><div class=""></div></div><div class="chartjs-size-monitor-shrink"><div class=""></div></div></div>
                <canvas class="chart chartjs-render-monitor" id="line-chart" style="min-height: 250px; height: 250px; max-height: 250px; max-width: 100%; display: block; width: 757px;" width="757" height="250"></canvas>
              </div>
              <!-- /.card-body -->
              <div class="card-footer bg-transparent">
                <div class="row">

                  <!-- ./col -->

                  <!-- ./col -->

                  <!-- ./col -->
                </div>
                <!-- /.row -->
              </div>
              <!-- /.card-footer -->
            </div>







      </div>
      <!-- User Registrations -->
      <div class="col-lg-4 col-12">
        <div class="small-box bg-warning">
          <div class="inner">
            <h3>{{users.count}}</h3>
            <p>Зарегистрированные пользователи</p>
          </div>
          <div class="icon">
            <i class="fas fa-user-plus"></i>
          </div>
        </div>
      </div>
    </div>

    <!-- Row 2: Visitors Map and Gender -->
    <div class="row">
      <!-- Visitors Map -->
      <div class="col-lg-12 col-12">
        <div class="card">


          <div class="card-header">
            <h3 class="card-title">Посетители</h3>
          </div>




          <div class="card">
              <div class="card-body">
                <div class="d-flex">
                  <p class="d-flex flex-column">
                    <span class="text-bold text-lg">820</span>
                    <span>Visitors Over Time</span>
                  </p>
                  <p class="ml-auto d-flex flex-column text-right">
                    <span class="text-success">
                      <i class="fas fa-arrow-up"></i> 12.5%
                    </span>
                    <span class="text-muted">Since last week</span>
                  </p>
                </div>
                <!-- /.d-flex -->

                <div class="position-relative mb-4"><div class="chartjs-size-monitor"><div class="chartjs-size-monitor-expand"><div class=""></div></div><div class="chartjs-size-monitor-shrink"><div class=""></div></div></div>
                  <canvas id="visitors-chart" height="200" style="display: block; width: 483px; height: 200px;" width="483" class="chartjs-render-monitor"></canvas>
                </div>

                <div class="d-flex flex-row justify-content-end">
                  <span class="mr-2">
                    <i class="fas fa-square text-primary"></i> This Week
                  </span>

                  <span>
                    <i class="fas fa-square text-gray"></i> Last Week
                  </span>
                </div>
              </div>
            </div>



        </div>
      </div>
      <!-- Gender Pie Chart -->
      <div class="col-lg-4 col-12">





      </div>
    </div>






<!-- Scripts -->
<script>
 window.chartLabels = {{ labels|safe }}

 window.scheduleData = {{ schedule_data|safe }}
 window.visitorData = {{ visitor_data|safe }}
 window.desktopTabletData = {{ desktop_tablet_data|safe }}

  window.MobileDesktopData = {{ mobile_desktop_data|safe }}
  window.MobileData = {{ mobile_data|safe }}
</script>


{%endblock%}

{% block extra_js %}
  <script type="text/javascript" src="http://code.jquery.com/jquery-1.11.3.min.js"></script>
  <script src="{% static 'jqvmap/dist/jquery.vmap.js' %}"></script>
  <script src="{% static 'jqvmap/dist/maps/jquery.vmap.ukraine.js' %}"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="{% static 'cms/js/data_graph.js' %}?v={{ version }}"></script>

{% endblock %}
