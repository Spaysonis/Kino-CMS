
services:
  web:
    build: ..
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./:app
      - ./static:/app/static
      - ./media:/app/media
    depends_on:
      - db

    environment:
      - DB_NAME=${NAME_DB}
      - DB_USER=${USER_DB}
      - DB_PASSWORD=${PASSWORD_DB}
      - DB_HOST=db
      - DB_PORT=5432
  db:
    image: postgres:latest
    environment:
      - POSTGRES_DB=${NAME_DB}
      - POSTGRES_USER=${USER_DB}
      - POSTGRES_PASSWORD=${PASSWORD_DB}
    volumes :
      - postgres_data:/var/lib/postgresql/data/


  redis:
    image: redis:latest
    ports:
      - "6379:6379"


  celery:
    build: ..
    command: celery -A config worker -l info
    volumes:
      - .:/var/www/html
    depends_on:
      - db
      - redis
    environment:
      - DB_NAME=${NAME_DB}
      - DB_USER=${USER_DB}
      - DB_PASSWORD=${PASSWORD_DB}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
      - ./static:/app/static
      - ./media:/app/media
    depends_on:
      - web
