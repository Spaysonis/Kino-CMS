
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    depends_on:
      - db

    environment:
      - DB_NAME=${NAME_DB}
      - DB_USER=${USER_DB}
      - DB_PASSWORD=${PASSWORD_DB}
      - DB_HOST=db
      - DB_PORT=5432
    deploy:
      resources:
        limits:
          memory: 500M
  db:
    env_file:
      - .env
    image: postgres:latest
    environment:
      - POSTGRES_DB=${NAME_DB}
      - POSTGRES_USER=${USER_DB}
      - POSTGRES_PASSWORD=${PASSWORD_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    deploy:
      resources:
        limits:
          memory: 300M


  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 100M


  celery:
    build: .
    command: celery -A config worker -l info --concurrency=1
    volumes:
      - .:/var/www/html
    depends_on:
      - db
      - redis
    environment:
      - DB_NAME=${NAME_DB}
      - DB_USER=${USER_DB}
      - DB_PASSWORD=${PASSWORD_DB}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    deploy:
      resources:
        limits:
          memory: 400M
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    depends_on:
      - web
volumes:
 postgres_data:
